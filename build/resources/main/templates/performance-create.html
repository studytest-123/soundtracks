<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Performance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="main-content">
    <div class="container py-4">

        <!-- Back Navigation -->
        <a th:href="@{/event/{id}(id=${event.eventId})}"
           class="btn btn-outline-light mb-3">
            ← Zur&uuml;ck zum Event
        </a>

        <div class="card p-4">

            <h4 class="mb-3">
                K&uuml;stler zu Event hinzuf&uuml;gen
            </h4>

            <p class="text-muted">
                <strong th:text="${event.eventName}">Event Name</strong>
            </p>

            <form th:action="@{/event/{id}/performance/new(id=${event.eventId})}"
                  method="post">

                <!-- Artist selection -->
                <div class="mb-3">

                    <label class="form-label">
                        K&uuml;nstler ausw&auml;hlen
                    </label>

                    <select name="artistId"
                            class="form-select"
                            required>

                        <option value="">
                            -- K&uuml;nstler w&auml;hlen --
                        </option>

                        <option th:each="artist : ${artists}"
                                th:value="${artist.artistId}"
                                th:text="${artist.artistName}">
                        </option>

                    </select>

                </div>

                <!-- Optional fields -->
                <div class="mb-3">

                    <label class="form-label">
                        Performance Typ
                    </label>

                    <input type="text"
                           name="performanceType"
                           class="form-control"
                           placeholder="z.B. DJ Set, Live Act">

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Genre
                    </label>

                    <input type="text"
                           name="performanceGenre"
                           class="form-control"
                           placeholder="z.B. Techno, House">

                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">

                    <button type="submit"
                            class="btn btn-primary">
                        K&uuml;stler hinzuf&uuml;gen
                    </button>

                    <a th:href="@{/event/{id}(id=${event.eventId})}"
                       class="btn btn-secondary">
                        Abbrechen
                    </a>

                </div>

            </form>

        </div>

    </div>
</div>

</body>
</html>
