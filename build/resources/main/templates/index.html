<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Startseite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<!-- Sidebar -->
<div class="sidebar">
    <!-- <h1 style="color:red">TEMPLATE TEST</h1> -->
    <h4 class="sidebar-title">🎶 SoundTracks</h4>

    <a th:href="@{/event/new}" class="btn btn-primary sidebar-btn">
        Event erstellen
    </a>

    <button class="btn btn-secondary sidebar-btn"
        data-bs-toggle="modal"
        data-bs-target="#eventSelectModal">
    Event bewerten
    </button>
    <hr class="sidebar-divider">

    <a th:href="@{/artist/new}" class="btn btn-secondary sidebar-btn">
        Künstler erstellen
    </a>
    
    <a th:href="@{/location/new}" class="btn btn-secondary sidebar-btn">
        Location erstellen
    </a>
    <hr class="sidebar-divider">

    <a th:href="@{/}" class="btn btn-outline-light sidebar-btn">
        Startseite
    </a>
    <!-- <a th:href="@{/logout}" class="btn btn-outline-light sidebar-btn">
    Logout
    </a> -->
    <div th:if="${user.userName != 'Anonymous User'}">
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light sidebar-btn">
                Logout
            </button>
        </form>
    </div>
    <div th:if="${user.userName == 'Anonymous User'}">
        <a th:href="@{/login}" class="btn btn-outline-light sidebar-btn">
            Login
        </a>
    </div>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="container py-4">
        <div class="row g-4 align-items-stretch">
            <!-- User Info -->
            <div class="col-md-4">
                <div class="card p-3 text-center h-100">
                    <div class="user-image mx-auto mb-3">Bild</div>
                    <h5 th:text="${user.userName}">User</h5>
                    <div class="rating mb-2">
                        <!-- <span>★ ★ ★ ★ ☆</span> -->
                    </div>
                    <ul class="list-unstyled">
                        <li th:text="'Bewertungen: ' + ${user.reviewCount}">Stat1</li>
                        <li th:text="'Event-Teilnahmen: ' + ${user.eventCount}">Stat2</li>
                        <li th:text="'Bewertungsscore: ' + ${user.reviewScore}">Stat3</li>
                    </ul>
                </div>
            </div>

            <!-- Latest Reviewed Event -->
            <div class="col-md-8">
                <a th:if="${latestReviewedEvent != null}"
                th:href="@{/event/{id}(id=${latestReviewedEvent.eventId})}"
                class="text-decoration-none text-white d-block h-100">
                    <div class="card p-3 h-100">
                        <h5 th:text="'Letztes bewertetes Event: ' + ${latestReviewedEvent.eventName} + ' @ ' + ${latestReviewedEvent.Location.locationName} + ' (' + ${latestReviewedEvent.eventDate} + ') '">
                            latest reviewd event
                        </h5>
                        <div class="row mt-2">
                            <div class="col-md-4">
                                <img th:src="@{${latestReviewedEvent.resolvedImage}}" class="event-image mb-2" alt="Event Bild"/>
                            </div>
                            <div class="col-md-8">
                                <!-- <div class="rating mb-2">
                                    <span>★ ★ ★ ☆ ☆</span>
                                </div> -->
                                <p th:text="${latestReviewedEvent.eventDescription}">Beschreibung (Vorschau)</p>
                                <p class="small"
                                   th:text="${latestReview.person.userName} + ' sagt:'">Username (Vorschau)
                                </p>
                                <p class="small"
                                   th:text="${latestReview.personalEventRatingComments}">Kommentare zum Event (Vorschau)
                                </p>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div class="section-title">Bevorstehende Events</div>

<div id="upcomingEventsCarousel" class="carousel slide">

    <div class="carousel-inner">

        <th:block th:each="i : ${#numbers.sequence(0, upcomingEvents.size()-1, 4)}">

            <div class="carousel-item"
                 th:classappend="${i == 0} ? 'active'">

                <div class="row row-cols-1 row-cols-md-4 g-3 align-items-stretch">

                    <div class="col"
                         th:each="event : ${upcomingEvents.subList(i, T(java.lang.Math).min(i+4, upcomingEvents.size()))}">

                        <a th:href="@{/event/{id}(id=${event.eventId})}"
                           class="d-block h-100 text-decoration-none text-white">

                            <div class="card p-2 h-100 d-flex flex-column">

                                <h6 th:text="${event.eventName} + ' @ ' + ${event.location.locationName}"></h6>
                                <h6 th:text="${event.eventDate}"></h6>

                                <img th:src="@{${event.resolvedImage}}" class="event-image mb-2" alt="Event Bild"/>

                                <p class="small"
                                   th:text="${#strings.abbreviate(event.eventDescription,80)}">
                                </p>
                                

                            </div>

                        </a>

                    </div>

                </div>

            </div>

        </th:block>

    </div>

    <!-- arrows -->
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#upcomingEventsCarousel"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#upcomingEventsCarousel"
            data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

    </button>


</div>

        <div class="section-title">Vergangene Events</div>

<div id="pastEventsCarousel" class="carousel slide">

    <div class="carousel-inner">

        <th:block th:each="i : ${#numbers.sequence(0, pastEvents.size()-1, 4)}">

            <div class="carousel-item"
                 th:classappend="${i == 0} ? 'active'">

                <div class="row row-cols-1 row-cols-md-4 g-3 align-items-stretch">

                    <div class="col"
                         th:each="event : ${pastEvents.subList(i, T(java.lang.Math).min(i+4, pastEvents.size()))}">

                        <a th:href="@{/event/{id}(id=${event.eventId})}"
                           class="d-block h-100 text-decoration-none text-white">

                            <div class="card p-2 h-100 d-flex flex-column">

                                <h6 th:text="${event.eventName} + ' @ ' + ${event.location.locationName}"></h6>
                                <h6 th:text="${event.eventDate}"></h6>

                                <img th:src="@{${event.resolvedImage}}" class="event-image mb-2" alt="Event Bild"/>

                                <p class="small"
                                   th:text="${#strings.abbreviate(event.eventDescription,80)}">
                                </p>

                            </div>

                        </a>

                    </div>

                </div>

            </div>

        </th:block>

    </div>

    <!-- arrows -->
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#pastEventsCarousel"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#pastEventsCarousel"
            data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

    </button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Event Selection Modal -->
<div class="modal fade" id="eventSelectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header">
                <h5 class="modal-title">Event ausw&auml;hlen</h5>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="list-group">

                    <a th:each="event : ${pastEvents}"
                       th:href="@{/review/new(eventId=${event.eventId})}"
                       class="list-group-item list-group-item-action bg-secondary text-white">

                        <strong th:text="${event.eventName} + ' @ ' + ${event.location.locationName}">Event</strong>
                        <br>
                        <small th:text="${event.eventDate}">Datum</small>

                    </a>

                </div>

            </div>

        </div>
    </div>
</div>
</body>
</html>
