<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="main-content">
    <div class="container py-4">

        <h3>
            Review for:
            <span th:text="${event.eventName}"></span>
        </h3>

        <form th:action="@{/review/new}" th:object="${review}" method="post">

            <!-- Hidden Event ID -->
            <input type="hidden"
                   th:name="event.eventId"
                   th:value="${event.eventId}" />

            <!-- Rating -->
            <div class="mb-3">
                <label class="form-label">Overall Rating (0–5)</label>
                <input type="number"
                       step="0.1"
                       min="0"
                       max="5"
                       class="form-control"
                       th:field="*{personalEventAverageRating}"
                       required>
            </div>

            <!-- Comment -->
            <div class="mb-3">
                <label class="form-label">Comment</label>
                <textarea class="form-control"
                          rows="4"
                          th:field="*{personalEventRatingComments}">
                </textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Submit Review
            </button>

            <a th:href="@{/event/{id}(id=${event.eventId})}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

</body>
</html>
