<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${event.eventName}">Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="main-content">
    <div class="container py-4">

        <!-- Navigation -->
        <a th:href="@{/}" class="btn btn-outline-light mb-3">
            ← Zurück zur Startseite
        </a>

        <div class="card p-4 mb-4">
    <h2 th:text="${event.eventName}">Event Name</h2>

    <div class="event-image my-3">Event Image</div>

    <dl class="row mt-3">

        <dt class="col-sm-3">Event ID</dt>
        <dd class="col-sm-9" th:text="${event.eventId}"></dd>

        <dt class="col-sm-3">Date</dt>
        <dd class="col-sm-9"
            th:text="${event.eventDate != null ? #temporals.format(event.eventDate, 'dd.MM.yyyy') : '—'}">
        </dd>

        <dt class="col-sm-3">Entry Time</dt>
        <dd class="col-sm-9"
            th:text="${event.eventEntry != null ? #temporals.format(event.eventEntry, 'HH:mm') : '—'}">
        </dd>

        <dt class="col-sm-3">Start Time</dt>
        <dd class="col-sm-9"
            th:text="${event.eventStart != null ? #temporals.format(event.eventStart, 'HH:mm') : '—'}">
        </dd>

        <dt class="col-sm-3">Type</dt>
        <dd class="col-sm-9"
            th:text="${event.eventType != null ? event.eventType : '—'}">
        </dd>

        <dt class="col-sm-3">Price</dt>
        <dd class="col-sm-9"
            th:text="${event.eventPrice != null ? event.eventPrice + ' €' : 'Free'}">
        </dd>

        <dt class="col-sm-3">Location</dt>
        <dd class="col-sm-9"
            th:text="${event.location != null ? event.location.locationName + ' (' + event.location.locationCity + ')' : '—'}">
        </dd>

        <dt class="col-sm-3">Capacity</dt>
        <dd class="col-sm-9"
            th:text="${event.location != null ? event.location.locationCapacity : '—'}">
        </dd>

    </dl>

    <hr class="my-4">

    <h5>Description</h5>
    <p th:text="${event.eventDescription != null ? event.eventDescription : '—'}">
        Event description here.
    </p>

    <div class="rating mt-3">
        <span>★ ★ ★ ★ ☆</span>
    </div>
</div>


        <!-- Placeholder for future features -->
        <div class="section-title">Next steps</div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Performances</h6>
                    <p class="text-muted small">
                        Artists & setlists coming soon
                    </p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Reviews</h6>
                    <p class="text-muted small">
                        User ratings coming soon
                    </p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Add Review</h6>
                    <a th:href="@{/review/new(eventId=${event.eventId})}"
                       class="btn btn-primary btn-sm">
                        Write Review
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
