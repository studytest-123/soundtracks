<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${event.eventName}">Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="main-content">
    <div class="container py-4">

        <!-- Navigation -->
        <a th:href="@{/}" class="btn btn-outline-light mb-3">
            ← Back to Home
        </a>

        <!-- Event Header -->
        <div class="card p-4 mb-4">
            <h2 th:text="${event.eventName}">Event Name</h2>

            <p class="text-muted mb-1">
                📅 <span th:text="${event.eventDate}">2026-01-01</span>
            </p>

            <p class="text-muted mb-3">
                📍 <span th:text="${event.location.locationName}">Location</span>,
                <span th:text="${event.location.locationCity}">City</span>
            </p>

            <p th:text="${event.eventDescription}">
                Event description
            </p>

            <p class="mt-3">
                💶 Entry price:
                <strong th:text="${event.eventPrice} + ' €'">0 €</strong>
            </p>
        </div>

        <!-- Placeholder for future features -->
        <div class="section-title">Next steps</div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Performances</h6>
                    <p class="text-muted small">
                        Artists & setlists coming soon
                    </p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Reviews</h6>
                    <p class="text-muted small">
                        User ratings coming soon
                    </p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Add Review</h6>
                    <a th:href="@{/review/new(eventId=${event.eventId})}"
                       class="btn btn-primary btn-sm">
                        Write Review
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
