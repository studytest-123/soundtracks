<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="main-content">
    <div class="container py-4">

        <!-- <h3>
            Bewertung f&uuml;r:
            <span th:text="${event.eventName}"></span>
        </h3> -->

        <form th:action="@{/review/new}" th:object="${review}" method="post" enctype="multipart/form-data">

            <!-- Hidden Event ID -->
            <input type="hidden"
                   name="eventId"
                   th:value="${event.eventId}" />

            <!-- Overall Event Rating -->
            <div class="mb-3">
                <!-- <label class="form-label">Event-Bewertung</label> -->
                <div class="overall-rating">
                    <h4>
                        Bewertung f&uuml;r:
                        <span th:text="|${event.eventName} in ${event.location.locationName}|"></span>
                        <span id="overall-stars">
                        ☆☆☆☆☆
                        </span>
                    </h4>
                </div>
            </div>
            <div class="mb-4">
                    <!-- Atmosphere -->
                    <div class="rating-block" data-segment="atmosphere">
                        <h4>
                            Atmosph&auml;re
                            <span class="segment-average">
                            ☆☆☆☆☆
                            </span>
                        </h4>

                        <!-- Event Vibe -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Stimmung</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'atmosphere.atmosphereEventVibe',
                                    'atmosphereEventVibe_'
                                )}"></div>
                            </div>
                            <!-- Crowd Engagement -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Publikum</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'atmosphere.atmosphereCrowdEngagement',
                                    'atmosphereCrowdEngagement_'
                                )}"></div>
                            </div>

                            <!-- Lighting & Visuals -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Beleuchtung & Visuals</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'atmosphere.atmosphereLightAndVisuals',
                                    'atmosphereLightAndVisuals_'
                                )}"></div>
                            </div>

                            <!-- Event Decorations -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Dekoration</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'atmosphere.atmosphereEventDecorations',
                                    'atmosphereEventDecorations_'
                                )}"></div>
                            </div>

                            <!-- Staff Friendliness -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Freundlichkeit (Mitarbeiter)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'atmosphere.atmosphereStaffFriendliness',
                                    'atmosphereStaffFriendliness_'
                                )}"></div>
                            </div>
                        </div>
                    </div>
                <!-- Gastronomy -->
                <div class="mb-4">
                    <div class="rating-block" data-segment="gastronomy">
                        <h4>
                            Gastronomie
                            <span class="segment-average">
                            ☆☆☆☆☆
                            </span>
                        </h4>

                        <!-- Food Quality -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Qualit&auml;t (Speisen)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyFoodQuality',
                                    'gastronomyFoodQuality_'
                                )}"></div>
                            </div>

                            <!-- Food Variety -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Vielfalt (Speisen)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyFoodVariety',
                                    'gastronomyFoodVariety_'
                                )}"></div>
                            </div>

                            <!-- Food Prices -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Preise (Speisen)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyFoodPrices',
                                    'gastronomyFoodPrices_'
                                )}"></div>
                            </div>

                            <!-- Drink Quality -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Qualit&auml;t (Getr&auml;nke)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyDrinkQuality',
                                    'gastronomyDrinkQuality_'
                                )}"></div>
                            </div>  

                            <!-- Drink Variety -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Vielfalt (Getr&auml;nke)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyDrinkVariety',
                                    'gastronomyDrinkVariety_'
                                )}"></div>
                            </div>

                            <!-- Drink Prices -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Preise (Getr&auml;nke)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyDrinkPrices',
                                    'gastronomyDrinkPrices_'
                                )}"></div>
                            </div>

                            <!-- Staff Efficiency -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Effizienz (Mitarbeiter)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyStaffEfficiency',
                                    'gastronomyStaffEfficiency_'
                                )}"></div>
                            </div>

                            <!-- Staff Friendliness -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Freundlichkeit (Mitarbeiter)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'gastronomy.gastronomyStaffFriendliness',
                                    'gastronomyStaffFriendliness_'
                                )}"></div>
                            </div>
                        </div>  
                    </div>
                </div>
                
                <!-- Location -->
                <div class="mb-4">
                    <div class="rating-block">
                        <h4>
                            Location
                            <span class="segment-average">
                            ☆☆☆☆☆
                            </span>
                        </h4>

                        <!-- Location Size -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Gr&ouml;&szlig;e</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'location.locationSize',
                                    'locationSize_'
                                )}"></div>
                            </div>

                            <!-- Location Area -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Umgebung</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'location.locationArea',
                                    'locationArea_'
                                )}"></div>
                            </div>

                            <!-- Location Accessibility -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Erreichbarkeit</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'location.locationAccessibility',
                                    'locationAccessibility_'
                                )}"></div>
                            </div>
                            
                            <!-- location Equipment -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Ausstattung</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'location.locationEquipment',
                                    'locationEquipment_'
                                )}"></div>
                            </div>

                            <!-- Location Ambience -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Ambiente</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'location.locationAmbience',
                                    'locationAmbience_'
                                )}"></div>
                            </div>

                            <!-- Location Cleanliness -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Sauberkeit</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'location.locationCleanliness',
                                    'locationCleanliness_'
                                )}"></div>
                            </div>

                            <!-- Location Staff -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Personal</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'location.locationStaff',
                                    'locationStaff_'
                                )}"></div>
                            </div>
                        </div>  
                    </div>
                </div>

                <!-- Merchandise -->
                 <div class="mb-4">
                    <div class="rating-block">
                        <h4>
                            Merchandise
                            <span class="segment-average">
                            ☆☆☆☆☆
                            </span>
                        </h4>

                        <!-- Merchandise Quality -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Qualit&auml;t</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'merchandise.merchandiseOverallQuality',
                                    'merchandiseOverallQuality_'
                                )}"></div>
                            </div>

                            <!-- Merchandise Variety -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Vielfalt</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'merchandise.merchandiseVariety',
                                    'merchandiseVariety_'
                                )}"></div>
                            </div>

                            
                            <!-- Merchandise Prices -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Preise</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'merchandise.merchandisePrices',
                                    'merchandisePrices_'
                                )}"></div>
                            </div>
                                <!-- Merchandise Staff -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Personal</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'merchandise.merchandiseStaffEfficiency',
                                    'merchandiseStaffEfficiency_'
                                )}"></div>
                            </div>
                            <!-- Payment Methods -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Bezahlmethoden</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'merchandise.merchandisePaymentMethods',
                                    'merchandisePaymentMethods_'
                                )}"></div>
                            </div>  
                            <!-- Merchandise Availability -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Verfügbarkeit</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'merchandise.merchandiseAvailability',
                                    'merchandiseAvailability_'
                                )}"></div>
                            </div>
                        </div>
                    </div>
                 </div>
            
                <!-- Restroom -->
                <div class="mb-4">
                    <div class="rating-block">
                        <h4>
                            Sanit&auml;rbereich
                            <span class="segment-average">
                            ☆☆☆☆☆
                            </span>
                        </h4>

                        <!-- Restroom Cleanliness -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Sauberkeit</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'restroom.restroomCleanliness',
                                    'restroomCleanliness_'
                                )}"></div>
                            </div>

                            <!-- Restroom Accessibility -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Barrierefreiheit</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'restroom.restroomAccessibility',
                                    'restroomAccessibility_'
                                )}"></div>
                            </div>

                            <!-- Restroom Supplies -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Verbrauchsmaterial</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'restroom.restroomSupplies',
                                    'restroomSupplies_'
                                )}"></div>
                            </div>

                            <!-- Restroom Size -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Größe</label>
                                    <div th:replace="~{fragments/rating :: stars(
                                    'restroom.restroomSize',
                                    'restroomSize_'
                                )}"></div>
                            </div>
                        </div>
                    </div>
                </div>

            
                <!-- Security -->
                <div class="mb-4">
                    <div class="rating-block">
                        <h4>
                        Sicherheit
                        <span class="segment-average">
                        ☆☆☆☆☆
                        </span>
                        </h4>

                        <!-- Security Friendliness -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Freundlichkeit (Sicherheitspersonal)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'security.securityStaffFriendliness',
                                    'securityStaffFriendliness_'
                                )}"></div>
                            </div>

                            <!-- Security Competence-->
                            <div class="d-flex align-items-center gap-2">
                                <label>Kompetenz (Sicherheitspersonal)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'security.securityStaffCompetence',
                                    'securityStaffCompetence_'
                                )}"></div>
                            </div>

                            <!-- Sense of Security -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Sicherheitsgef&uuml;hl</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'security.securitySenseOfSecurity',
                                    'securitySenseOfSecurity_'
                                )}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sound -->
                <div class="mb-4">
                    <div class="rating-block">
                        <h4>
                        Sound
                        <span class="segment-average">
                        ☆☆☆☆☆
                        </span>
                        </h4>

                        <!-- Sound OverallQuality -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Qualit&auml;t</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'sound.soundOverallQuality',
                                    'soundOverallQuality_'
                                )}"></div>
                            </div>

                            <!-- Sound Loudness -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Lautst&auml;rke</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'sound.soundLoudness',
                                    'soundLoudness_'
                                )}"></div>
                            </div>

                            <!-- Sound Technical Issues -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Technische Probleme</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'sound.soundTechnicalIssues',
                                    'soundTechnicalIssues_'
                                )}"></div>
                            </div>

                            <!-- Sound Room Acoustics -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Raumakustik</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'sound.soundRoomAcoustics',
                                    'soundRoomAcoustics_'
                                )}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Wardrobe -->
                <div class="mb-4">
                    <div class="rating-block">
                        <h4>
                        Garderobe
                        <span class="segment-average">
                        ☆☆☆☆☆
                        </span>
                        </h4>

                        <!-- Wardrobe Price -->
                        <div class="d-flex flex-wrap gap-3">
                            <div class="d-flex align-items-center gap-2">
                                <label>Preis</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'wardrobe.wardrobePrice',
                                    'wardrobePrice_'
                                )}"></div>
                            </div>

                            <!-- Wardrobe Staff Efficiency -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Effizienz (Bedienung)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'wardrobe.wardrobeStaffEfficiency',
                                    'wardrobeStaffEfficiency_'
                                )}"></div>
                            </div>

                            <!-- Wardrobe Staff Friendliness -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Freundlichkeit (Bedienung)</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'wardrobe.wardrobeStaffFriendliness',
                                    'wardrobeStaffFriendliness_'
                                )}"></div>
                            </div>

                            <!-- Wardrobe Quality -->
                            <div class="d-flex align-items-center gap-2">
                                <label>Qualit&auml;t</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'wardrobe.wardrobeQuality',
                                    'wardrobeQuality_'
                                )}"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Event Comment -->
                 <!-- <div class="row"> -->
                    <div class="mb-3">
                        <label class="form-label">Eventkommentar</label>
                        <textarea class="form-control"
                                rows="4"
                                th:field="*{personalEventRatingComments}"></textarea>
                    </div>
                 <!-- </div> -->

                <!-- Event Image Upload -->
                <div class="mb-3">
                    <label class="form-label">Event Bild</label>
                    <input type="file" name="image" class="form-control"/>
                </div>

                <!-- Performances -->
                <h5 class="mt-4">Performances</h5>

                <div th:each="performance, stat : ${performances}"
                    class="card p-3 mb-3">
                    <div class="rating-block">
                        <h6>
                            <span th:text="${performance.artist.artistName}">
                            K&uuml;nstlername
                            </span>
                            <span class="segment-average">
                            ☆☆☆☆☆
                            </span>
                        </h6>
                        <input type="hidden"
                            th:name="'performanceRatings[' + ${stat.index} + '].performance.performanceId'"
                            th:value="${performance.performanceId}" />

                        <div class="d-flex flex-wrap gap-3">

                            <div class="d-flex align-items-center gap-2">
                                <label>Performance</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'performanceRatings[' + ${stat.index} + '].performanceQuality',
                                    'performance_' + ${stat.index} + '_'
                                )}"></div>
                            </div>

                            <div class="d-flex align-items-center gap-2">
                                <label>Sound</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'performanceRatings[' + ${stat.index} + '].soundQuality',
                                    'sound_' + ${stat.index} + '_'
                                )}"></div>
                            </div>

                            <div class="d-flex align-items-center gap-2">
                                <label>Dauer</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'performanceRatings[' + ${stat.index} + '].setLength',
                                    'setlength_' + ${stat.index} + '_'
                                )}"></div>
                            </div>

                            <div class="d-flex align-items-center gap-2">
                                <label>Setlist</label>
                                <div th:replace="~{fragments/rating :: stars(
                                    'performanceRatings[' + ${stat.index} + '].trackSelection',
                                    'tracksel_' + ${stat.index} + '_'
                                )}"></div>
                            </div>

                            <div class="d-flex align-items-center gap-2">
                                <label>Show</label>
                                <div class="star-rating">
                                    <div th:replace="~{fragments/rating :: stars(
                                    'performanceRatings[' + ${stat.index} + '].visualShow',
                                    'show_' + ${stat.index} + '_'
                                )}"></div>
                            </div>
                        </div>
                    
                        <!-- Performance Comment -->
                        <div class="mt-3 w-100">
                            <label class="form-label">Performancekommentar</label>
                            <textarea class="form-control"
                                    rows="4"
                                    th:name="'performanceRatings[' + ${stat.index} + '].performanceRatingComments'"></textarea>
                        </div>
                    </div>
                </div>
                </div>
            <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    Bewertung speichern
                </button>

                <a th:href="@{/event/{id}(id=${event.eventId})}"
                class="btn btn-secondary">
                    Abbrechen
                </a>
            </div>

        </form>

    </div>
</div>

<script th:src="@{/js/review-rating.js}"></script>

</body>
</html>
