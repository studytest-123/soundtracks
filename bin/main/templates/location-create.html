<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Location erstellen</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="main-content">

<div class="container py-4">

<h3>Location erstellen</h3>

<form th:action="@{/location/new}" th:object="${location}" method="post">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" th:field="*{locationName}" required>
</div>

<div class="mb-3">
<label class="form-label">Adresse</label>
<input type="text" class="form-control" th:field="*{locationAddress}">
</div>

<div class="mb-3">
<label class="form-label">PLZ</label>
<input type="text" class="form-control" th:field="*{locationPostalCode}">
</div>

<div class="mb-3">
<label class="form-label">Ort</label>
<input type="text" class="form-control" th:field="*{locationCity}">
</div>

<div class="mb-3">
<label class="form-label">Land</label>
<input type="text" class="form-control" th:field="*{locationCountry}">
</div>

<div class="mb-3">
<label class="form-label">Kapazit&auml;t</label>
<input type="text" class="form-control" th:field="*{locationCapacity}">
</div>

<div class="mb-3">
<label class="form-label">Beschreibung</label>
<textarea class="form-control" rows="4" th:field="*{locationDescription}"></textarea>
</div>

<button type="submit" class="btn btn-primary">
Speichern
</button>

<a th:href="@{/}" class="btn btn-secondary">
Abbrechen
</a>

</form>

</div>

</div>

</body>
</html>
