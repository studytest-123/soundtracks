<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Startseite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<!-- Sidebar -->
<div class="sidebar">
    <!-- <h1 style="color:red">TEMPLATE TEST</h1> -->
    <h4 class="sidebar-title">🎶 SoundTracks</h4>

    <a th:href="@{/event/new}" class="btn btn-primary sidebar-btn">
        Event erstellen
    </a>

    <button class="btn btn-secondary sidebar-btn"
        data-bs-toggle="modal"
        data-bs-target="#eventSelectModal">
    Event bewerten
    </button>
    <hr class="sidebar-divider">

    <a th:href="@{/artist/new}" class="btn btn-secondary sidebar-btn">
        Künstler erstellen
    </a>
    
    <a th:href="@{/location/new}" class="btn btn-secondary sidebar-btn">
        Location erstellen
    </a>
    <hr class="sidebar-divider">

    <a th:href="@{/}" class="btn btn-outline-light sidebar-btn">
        Startseite
    </a>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="container py-4">
        <div class="row g-4">
            <!-- User Info -->
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <div class="user-image mx-auto mb-3">Bild</div>
                    <h5 th:text="${user.userName}">User</h5>
                    <div class="rating mb-2">
                        <span>★ ★ ★ ★ ☆</span>
                    </div>
                    <ul class="list-unstyled">
                        <li th:text="${user.reviewCount}">Stat1</li>
                        <li th:text="${user.eventCount}">Stat2</li>
                        <li th:text="${user.reviewScore}">Stat3</li>
                    </ul>
                </div>
            </div>

            <!-- Latest Event -->
            <div class="col-md-8">
                <a th:href="@{/event/{id}(id=${latestEvent.eventId})}" class="text-decoration-none text-white">
                    <div class="card p-3">
                        <h5 th:text="'Neuestes Event: ' + ${latestEvent.eventName} + ' @ ' + ${latestEvent.Location.locationName}">
                            latest event
                        </h5>
                        <div class="row mt-2">
                            <div class="col-md-4">
                                <div class="event-image">Event Bild</div>
                            </div>
                            <div class="col-md-8">
                                <!-- <div class="rating mb-2">
                                    <span>★ ★ ★ ☆ ☆</span>
                                </div> -->
                                <p th:text="${latestEvent.eventDescription}">Beschreibung (Vorschau)</p>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Event Groups -->
        <!-- <div class="section-title">Upcoming Events</div>
        <div class="row row-cols-1 row-cols-md-4 g-3">
            <div class="col" th:each="event : ${upcomingEvents}">
                <a th:href="@{/event/{id}(id=${event.eventId})}" class="text-decoration-none text-white">
                    <div class="card p-2">
                        <h6 th:text="${event.eventName}">Event75 (Today)</h6>
                        <div class="event-image mb-2"></div>
                        <div class="rating"><span>☆ ☆ ☆ ☆ ☆</span></div>
                        <p class="small" th:text="${event.eventDescription}">Description (Preview)</p>
                    </div>
                </a>
            </div>
        </div> -->

        <div class="section-title">Bevorstehende Events</div>

<div id="upcomingEventsCarousel" class="carousel slide">

    <div class="carousel-inner">

        <th:block th:each="i : ${#numbers.sequence(0, upcomingEvents.size()-1, 4)}">

            <div class="carousel-item"
                 th:classappend="${i == 0} ? 'active'">

                <div class="row row-cols-1 row-cols-md-4 g-3">

                    <div class="col"
                         th:each="event : ${upcomingEvents.subList(i, T(java.lang.Math).min(i+4, upcomingEvents.size()))}">

                        <a th:href="@{/event/{id}(id=${event.eventId})}"
                           class="text-decoration-none text-white">

                            <div class="card p-2">

                                <h6 th:text="${event.eventName}"></h6>

                                <div class="event-image mb-2"></div>

                                <p class="small"
                                   th:text="${#strings.abbreviate(event.eventDescription,80)}">
                                </p>

                            </div>

                        </a>

                    </div>

                </div>

            </div>

        </th:block>

    </div>

    <!-- arrows -->
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#upcomingEventsCarousel"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#upcomingEventsCarousel"
            data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

    </button>


</div>

        <!-- <div class="section-title">Past Events</div>
            <div class="row row-cols-1 row-cols-md-4 g-3">
                <div class="col" th:each="event : ${pastEvents}">
                    <a th:href="@{/event/{id}(id=${event.eventId})}" class="text-decoration-none text-white">
                        <div class="card p-2">
                            <h6 th:text="${event.eventName}">Event74 (Yesterday)</h6>
                            <div class="event-image mb-2"></div>
                            <div class="rating"><span>★ ★ ☆ ☆ ☆</span></div>
                            <p class="small" th:text="${event.eventDescription}">Description (Preview)</p>
                        </div>
                    </a>
                </div>
            </div>
        </div> -->
        <div class="section-title">Vergangene Events</div>

<div id="pastEventsCarousel" class="carousel slide">

    <div class="carousel-inner">

        <th:block th:each="i : ${#numbers.sequence(0, pastEvents.size()-1, 4)}">

            <div class="carousel-item"
                 th:classappend="${i == 0} ? 'active'">

                <div class="row row-cols-1 row-cols-md-4 g-3">

                    <div class="col"
                         th:each="event : ${pastEvents.subList(i, T(java.lang.Math).min(i+4, pastEvents.size()))}">

                        <a th:href="@{/event/{id}(id=${event.eventId})}"
                           class="text-decoration-none text-white">

                            <div class="card p-2">

                                <h6 th:text="${event.eventName}"></h6>

                                <div class="event-image mb-2"></div>

                                <p class="small"
                                   th:text="${#strings.abbreviate(event.eventDescription,80)}">
                                </p>

                            </div>

                        </a>

                    </div>

                </div>

            </div>

        </th:block>

    </div>

    <!-- arrows -->
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#pastEventsCarousel"
            data-bs-slide="prev">

        <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#pastEventsCarousel"
            data-bs-slide="next">

        <span class="carousel-control-next-icon"></span>

    </button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Event Selection Modal -->
<div class="modal fade" id="eventSelectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header">
                <h5 class="modal-title">Select Event to Review</h5>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="list-group">

                    <a th:each="event : ${events}"
                       th:href="@{/review/new(eventId=${event.eventId})}"
                       class="list-group-item list-group-item-action bg-secondary text-white">

                        <strong th:text="${event.eventName}">Event Name</strong>
                        <br>
                        <small th:text="${event.eventDate}">Date</small>

                    </a>

                </div>

            </div>

        </div>
    </div>
</div>
</body>
</html>
